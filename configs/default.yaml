project:
  name: vlm_input_pruning

small_vlm:
  backend: mock
  model_name: null
  device: auto
  max_new_tokens: 96

detector:
  backend: dummy
  yolo_model: yolov8n.pt
  confidence_threshold: 0.25
  max_detections: 12

crop_selection:
  top_k: 8
  min_score: 0.05
  weights:
    detection_score: 0.45
    area: 0.20
    centrality: 0.15
    question_relevance: 0.15
    context_mention: 0.05

crop_composer:
  max_canvas_width: 1600
  max_canvas_height: 1600
  tile_padding: 12
  crop_margin: 0.08
  annotate: true
  background_color: [245, 245, 245]

token_estimator:
  backend: qwen_like
  patch_size: 28
  min_pixels: 3136
  max_pixels: 12845056

main_vlm:
  backend: dummy
  endpoint_url: null
  api_key_env: OPENAI_API_KEY
  model: qwen-vl-placeholder
  timeout_seconds: 120

outputs:
  save_detections_visualization: true
  save_individual_crops: true
  save_final_prompt: true
  save_metadata: true
